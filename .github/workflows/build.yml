# ============================================================================
#  6b6t Meteor Addon — Single-file GitHub Actions build
#  Addon:  6b6t
#  Module: CrystalKillAuraV2 (Combat / 6b6t category)
#  Target: Minecraft 1.21.1  +  Meteor Client 0.5.8-SNAPSHOT  +  Fabric
#  Build:  Java 21  +  Gradle 8.8  +  fabric-loom 1.7-SNAPSHOT
#
#  How to use:
#    1) In your GitHub repo, create the file  .github/workflows/build.yml
#    2) Paste THIS entire file into it. Nothing else is needed in the repo.
#    3) Push to `main` (or click "Run workflow"). The JAR appears under
#       Actions ▸ this run ▸ Artifacts, or under Releases when you push a tag.
# ============================================================================

name: Build 6b6t Addon

on:
  push:
    branches: [ "main", "master" ]
    tags:     [ "v*" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ------------------------------------------------------------------ #
      # 0. Checkout (only needed so Actions has a workspace)                #
      # ------------------------------------------------------------------ #
      - name: Checkout
        uses: actions/checkout@v4

      # ------------------------------------------------------------------ #
      # 1. Java 21 (required by MC 1.21.1)                                  #
      # ------------------------------------------------------------------ #
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      # ------------------------------------------------------------------ #
      # 2. Generate the whole Fabric/Meteor addon project inline           #
      # ------------------------------------------------------------------ #
      - name: Generate project sources
        run: |
          set -e
          ROOT="$GITHUB_WORKSPACE/addon"
          PKG_DIR="$ROOT/src/main/java/com/sixbsixt/addon"
          RES_DIR="$ROOT/src/main/resources"
          ASSETS_DIR="$RES_DIR/assets/sixbsixt"

          mkdir -p "$PKG_DIR" "$RES_DIR" "$ASSETS_DIR"

          # -------------------------------------------------------------- #
          # settings.gradle                                                #
          # -------------------------------------------------------------- #
          cat > "$ROOT/settings.gradle" <<'GRADLE_SETTINGS'
          pluginManagement {
              repositories {
                  maven { name = 'Fabric'; url = 'https://maven.fabricmc.net/' }
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          rootProject.name = 'sixbsixt-addon'
          GRADLE_SETTINGS

          # -------------------------------------------------------------- #
          # gradle.properties                                              #
          # -------------------------------------------------------------- #
          cat > "$ROOT/gradle.properties" <<'GRADLE_PROPS'
          org.gradle.jvmargs=-Xmx2G
          org.gradle.parallel=true
          org.gradle.caching=true

          # Fabric
          minecraft_version=1.21.1
          yarn_version=1.21.1+build.3
          loader_version=0.16.5

          # Meteor
          meteor_version=0.5.8

          # Mod
          mod_version=1.0.0
          maven_group=com.sixbsixt
          archives_base_name=6b6t-addon
          GRADLE_PROPS

          # -------------------------------------------------------------- #
          # build.gradle                                                   #
          # -------------------------------------------------------------- #
          cat > "$ROOT/build.gradle" <<'GRADLE_BUILD'
          plugins {
              id 'fabric-loom' version '1.7-SNAPSHOT'
          }

          sourceCompatibility = targetCompatibility = JavaVersion.VERSION_21

          archivesBaseName = project.archives_base_name
          version = project.mod_version
          group   = project.maven_group

          repositories {
              mavenCentral()
              maven { url 'https://maven.meteordev.org/releases'  }
              maven { url 'https://maven.meteordev.org/snapshots' }
              maven { url 'https://jitpack.io' }
          }

          dependencies {
              minecraft "com.mojang:minecraft:${project.minecraft_version}"
              mappings  "net.fabricmc:yarn:${project.yarn_version}:v2"
              modImplementation "net.fabricmc:fabric-loader:${project.loader_version}"

              // Meteor Client 0.5.8-SNAPSHOT for MC 1.21.1
              modImplementation "meteordevelopment:meteor-client:${project.meteor_version}-SNAPSHOT"
          }

          processResources {
              inputs.property 'version', project.version
              filesMatching('fabric.mod.json') {
                  expand 'version'       : project.version,
                         'mc_version'    : project.minecraft_version
              }
          }

          tasks.withType(JavaCompile).configureEach {
              it.options.encoding = 'UTF-8'
              it.options.release  = 21
          }

          jar {
              from('LICENSE') { rename { "${it}_${archivesBaseName}" } }
          }
          GRADLE_BUILD

          # -------------------------------------------------------------- #
          # fabric.mod.json                                                #
          # -------------------------------------------------------------- #
          cat > "$RES_DIR/fabric.mod.json" <<'FMJ'
          {
            "schemaVersion": 1,
            "id": "sixbsixt",
            "version": "${version}",
            "name": "6b6t",
            "description": "6b6t addon for Meteor Client — CrystalKillAuraV2.",
            "authors": [ "6b6t" ],
            "contact": {},
            "license": "MIT",
            "icon": "assets/sixbsixt/icon.png",
            "environment": "client",
            "entrypoints": {
              "meteor": [ "com.sixbsixt.addon.Addon6b6t" ]
            },
            "custom": {
              "meteor-client:color": "180,0,255",
              "modmenu": { "parent": { "id": "meteor-client" } }
            },
            "depends": {
              "java": ">=21",
              "minecraft": "~${mc_version}",
              "meteor-client": "*"
            }
          }
          FMJ

          # 16x16 magenta PNG (base64, valid) so fabric.mod.json icon resolves
          base64 -d > "$ASSETS_DIR/icon.png" <<'ICON_B64'
          iVBORw0KGgoAAAANSUhEUgAAABAAAAAQCAIAAACRXR/mAAAAOklEQVR4nO3OMQEAIAzA
          MMC/56EBHmxJlPTuzOw6O4CvBBAJIBJAJIBIAJEAIgFEAogEEAkgEkD0AByCAScUw+aq
          AAAAAElFTkSuQmCC
          ICON_B64

          # -------------------------------------------------------------- #
          # Addon6b6t.java — MeteorAddon entrypoint                        #
          # -------------------------------------------------------------- #
          cat > "$PKG_DIR/Addon6b6t.java" <<'JAVA_ADDON'
          package com.sixbsixt.addon;

          import com.mojang.logging.LogUtils;
          import meteordevelopment.meteorclient.addons.MeteorAddon;
          import meteordevelopment.meteorclient.systems.modules.Category;
          import meteordevelopment.meteorclient.systems.modules.Modules;
          import net.minecraft.item.Items;
          import org.slf4j.Logger;

          public class Addon6b6t extends MeteorAddon {
              public static final Logger LOG = LogUtils.getLogger();
              public static final Category CATEGORY =
                  new Category("6b6t", Items.END_CRYSTAL.getDefaultStack());

              @Override
              public void onInitialize() {
                  LOG.info("[6b6t] Initializing addon…");
                  Modules.get().add(new CrystalKillAuraV2());
              }

              @Override
              public void onRegisterCategories() {
                  Modules.registerCategory(CATEGORY);
              }

              @Override
              public String getPackage() {
                  return "com.sixbsixt.addon";
              }
          }
          JAVA_ADDON

          # -------------------------------------------------------------- #
          # CrystalKillAuraV2.java — the module                            #
          # -------------------------------------------------------------- #
          cat > "$PKG_DIR/CrystalKillAuraV2.java" <<'JAVA_MODULE'
          package com.sixbsixt.addon;

          import meteordevelopment.meteorclient.events.world.TickEvent;
          import meteordevelopment.meteorclient.events.render.Render3DEvent;
          import meteordevelopment.meteorclient.renderer.ShapeMode;
          import meteordevelopment.meteorclient.settings.*;
          import meteordevelopment.meteorclient.systems.friends.Friends;
          import meteordevelopment.meteorclient.systems.modules.Module;
          import meteordevelopment.meteorclient.utils.entity.DamageUtils;
          import meteordevelopment.meteorclient.utils.player.FindItemResult;
          import meteordevelopment.meteorclient.utils.player.InvUtils;
          import meteordevelopment.meteorclient.utils.player.Rotations;
          import meteordevelopment.meteorclient.utils.render.color.SettingColor;
          import meteordevelopment.orbit.EventHandler;
          import net.minecraft.block.BlockState;
          import net.minecraft.entity.Entity;
          import net.minecraft.entity.EntityType;
          import net.minecraft.entity.LivingEntity;
          import net.minecraft.entity.decoration.EndCrystalEntity;
          import net.minecraft.entity.player.PlayerEntity;
          import net.minecraft.item.Items;
          import net.minecraft.network.packet.c2s.play.PlayerInteractBlockC2SPacket;
          import net.minecraft.network.packet.c2s.play.PlayerInteractEntityC2SPacket;
          import net.minecraft.util.Hand;
          import net.minecraft.util.hit.BlockHitResult;
          import net.minecraft.util.math.BlockPos;
          import net.minecraft.util.math.Box;
          import net.minecraft.util.math.Direction;
          import net.minecraft.util.math.Vec3d;
          import net.minecraft.screen.slot.SlotActionType;

          import java.util.Set;

          /**
           *  Crystal Kill Aura V2 — designed for high-ping / Energy-style servers.
           *  All settings are exposed in the Meteor GUI, everything runs off the
           *  main tick and directly through the network handler (no interaction
           *  manager, no cooldown gating), so throughput stays well above BlockOut.
           */
          public class CrystalKillAuraV2 extends Module {

              // ---------------------------------------------------------------
              //   SETTING GROUPS
              // ---------------------------------------------------------------
              private final SettingGroup sgGeneral = settings.getDefaultGroup();
              private final SettingGroup sgPlace   = settings.createGroup("Place");
              private final SettingGroup sgBreak   = settings.createGroup("Break");
              private final SettingGroup sgSwitch  = settings.createGroup("Switch");
              private final SettingGroup sgRender  = settings.createGroup("Render");

              // ---------------------------------------------------------------
              //   GENERAL
              // ---------------------------------------------------------------
              private final Setting<Double> targetRange = sgGeneral.add(new DoubleSetting.Builder()
                  .name("target-range").description("Radius (blocks) around you to look for targets.")
                  .defaultValue(12).min(0).sliderRange(0, 32).build());

              private final Setting<Double> minDamage = sgGeneral.add(new DoubleSetting.Builder()
                  .name("min-damage").description("Minimum damage a crystal must deal to the target.")
                  .defaultValue(6).min(0).sliderRange(0, 36).build());

              private final Setting<Double> maxSelfDamage = sgGeneral.add(new DoubleSetting.Builder()
                  .name("max-self-damage").description("Never place/break if it would deal MORE than this to you.")
                  .defaultValue(6).min(0).sliderRange(0, 36).build());

              private final Setting<Boolean> antiSuicide = sgGeneral.add(new BoolSetting.Builder()
                  .name("anti-suicide").description("Refuse actions that would kill you.")
                  .defaultValue(true).build());

              private final Setting<Boolean> friendsRemove = sgGeneral.add(new BoolSetting.Builder()
                  .name("friends-remove").description("Ignore Meteor friends as targets.")
                  .defaultValue(true).build());

              private final Setting<Set<EntityType<?>>> entities = sgGeneral.add(
                  new EntityTypeListSetting.Builder()
                      .name("entities")
                      .description("Every entity type the aura may target (all in one list).")
                      .onlyAttackable()
                      .defaultValue(EntityType.PLAYER)
                      .build());

              private final Setting<Boolean> rotate = sgGeneral.add(new BoolSetting.Builder()
                  .name("rotate").description("Server-side rotate to the crystal position.")
                  .defaultValue(true).build());

              private final Setting<Boolean> highPing = sgGeneral.add(new BoolSetting.Builder()
                  .name("high-ping-mode")
                  .description("Predictive placing: fires break packets on the predicted crystal "
                             + "before the server confirms the spawn. Faster than BlockOut.")
                  .defaultValue(true).build());

              // ---------------------------------------------------------------
              //   PLACE
              // ---------------------------------------------------------------
              private final Setting<Boolean> doPlace = sgPlace.add(new BoolSetting.Builder()
                  .name("place").description("Place crystals.").defaultValue(true).build());

              private final Setting<Integer> placeDelay = sgPlace.add(new IntSetting.Builder()
                  .name("place-delay-ticks").description("Ticks to wait between placements.")
                  .defaultValue(0).min(0).sliderRange(0, 20).build());

              private final Setting<Double> placeRange = sgPlace.add(new DoubleSetting.Builder()
                  .name("place-range").description("Range for placing crystals (line of sight).")
                  .defaultValue(4.5).min(0).sliderRange(0, 8).build());

              private final Setting<Double> wallsRange = sgPlace.add(new DoubleSetting.Builder()
                  .name("walls-range").description("Range for placing crystals BEHIND blocks.")
                  .defaultValue(4.0).min(0).sliderRange(0, 8).build());

              private final Setting<Integer> placesPerTick = sgPlace.add(new IntSetting.Builder()
                  .name("places-per-tick").description("How many crystals per tick (raise for high ping).")
                  .defaultValue(2).min(1).sliderRange(1, 8).build());

              // ---------------------------------------------------------------
              //   BREAK
              // ---------------------------------------------------------------
              private final Setting<Boolean> doBreak = sgBreak.add(new BoolSetting.Builder()
                  .name("break").description("Break crystals.").defaultValue(true).build());

              private final Setting<Integer> breakDelay = sgBreak.add(new IntSetting.Builder()
                  .name("break-delay-ticks").description("Ticks to wait between crystal attacks.")
                  .defaultValue(0).min(0).sliderRange(0, 20).build());

              private final Setting<Double> breakRange = sgBreak.add(new DoubleSetting.Builder()
                  .name("break-range").description("Range for breaking crystals.")
                  .defaultValue(5.5).min(0).sliderRange(0, 8).build());

              private final Setting<Integer> breaksPerTick = sgBreak.add(new IntSetting.Builder()
                  .name("breaks-per-tick").description("How many crystals per tick (raise for high ping).")
                  .defaultValue(4).min(1).sliderRange(1, 16).build());

              // ---------------------------------------------------------------
              //   SWITCH
              // ---------------------------------------------------------------
              public enum SwitchMode { None, Normal, Silent, SilentFromInventory }

              private final Setting<SwitchMode> switchMode = sgSwitch.add(new EnumSetting.Builder<SwitchMode>()
                  .name("switch-mode")
                  .description("Silent = swap slot for the packet only. "
                             + "SilentFromInventory = also move a crystal into hotbar first, then swap back.")
                  .defaultValue(SwitchMode.SilentFromInventory).build());

              // ---------------------------------------------------------------
              //   RENDER
              // ---------------------------------------------------------------
              private final Setting<Boolean> render = sgRender.add(new BoolSetting.Builder()
                  .name("render").description("Render placement box.").defaultValue(true).build());

              private final Setting<SettingColor> renderSide = sgRender.add(new ColorSetting.Builder()
                  .name("side-color").defaultValue(new SettingColor(180, 0, 255, 30)).build());

              private final Setting<SettingColor> renderLine = sgRender.add(new ColorSetting.Builder()
                  .name("line-color").defaultValue(new SettingColor(180, 0, 255, 255)).build());

              // ---------------------------------------------------------------
              //   RUNTIME STATE
              // ---------------------------------------------------------------
              private int placeTimer, breakTimer;
              private BlockPos lastPlace;

              public CrystalKillAuraV2() {
                  super(Addon6b6t.CATEGORY, "crystal-kill-aura-v2",
                        "High-ping crystal aura V2 for the 6b6t addon.");
              }

              @Override public void onActivate()   { placeTimer = 0; breakTimer = 0; lastPlace = null; }
              @Override public void onDeactivate() { lastPlace = null; }

              // ---------------------------------------------------------------
              //   MAIN LOOP
              // ---------------------------------------------------------------
              @EventHandler
              private void onTick(TickEvent.Pre e) {
                  if (mc.player == null || mc.world == null) return;

                  if (placeTimer > 0) placeTimer--;
                  if (breakTimer > 0) breakTimer--;

                  LivingEntity target = findTarget();
                  if (target == null) return;

                  // 1) break existing crystals
                  if (doBreak.get() && breakTimer == 0) {
                      int broken = 0;
                      for (Entity ent : mc.world.getEntities()) {
                          if (!(ent instanceof EndCrystalEntity crystal)) continue;
                          if (crystal.distanceTo(mc.player) > breakRange.get()) continue;

                          double dmgTarget = DamageUtils.crystalDamage(
                              target, target.getPos(), target.getBoundingBox(),
                              crystal.getPos(), DamageUtils.HIT_FACTORY);
                          double dmgSelf   = DamageUtils.crystalDamage(
                              mc.player, mc.player.getPos(), mc.player.getBoundingBox(),
                              crystal.getPos(), DamageUtils.HIT_FACTORY);

                          if (dmgTarget < minDamage.get()) continue;
                          if (dmgSelf > maxSelfDamage.get()) continue;
                          if (antiSuicide.get() && dmgSelf >= mc.player.getHealth() + mc.player.getAbsorptionAmount()) continue;

                          attackCrystal(crystal);
                          broken++;
                          if (broken >= breaksPerTick.get()) break;
                      }
                      if (broken > 0) breakTimer = breakDelay.get();
                  }

                  // 2) place new crystals
                  if (doPlace.get() && placeTimer == 0) {
                      int placed = 0;
                      for (int i = 0; i < placesPerTick.get(); i++) {
                          BlockPos pos = findBestPlacement(target);
                          if (pos == null) break;
                          if (!ensureCrystalHeld()) break;
                          placeCrystal(pos);
                          lastPlace = pos;
                          placed++;

                          // High-ping predictive break — attack the *predicted*
                          // crystal position immediately, without waiting for
                          // the server to spawn the entity. Faster than BlockOut.
                          if (highPing.get() && doBreak.get()) {
                              for (Entity ent : mc.world.getEntities()) {
                                  if (!(ent instanceof EndCrystalEntity c)) continue;
                                  if (c.getBlockPos().equals(pos.up())) { attackCrystal(c); break; }
                              }
                          }
                      }
                      if (placed > 0) placeTimer = placeDelay.get();
                  }
              }

              // ---------------------------------------------------------------
              //   TARGETING
              // ---------------------------------------------------------------
              private LivingEntity findTarget() {
                  LivingEntity best = null;
                  double bestDist = Double.MAX_VALUE;
                  for (Entity e : mc.world.getEntities()) {
                      if (!(e instanceof LivingEntity le)) continue;
                      if (e == mc.player) continue;
                      if (!le.isAlive()) continue;
                      if (!entities.get().contains(e.getType())) continue;
                      if (le instanceof PlayerEntity p && friendsRemove.get() && Friends.get().isFriend(p)) continue;
                      double d = mc.player.distanceTo(le);
                      if (d > targetRange.get()) continue;
                      if (d < bestDist) { bestDist = d; best = le; }
                  }
                  return best;
              }

              // ---------------------------------------------------------------
              //   PLACEMENT SEARCH — picks the position with the highest damage
              // ---------------------------------------------------------------
              private BlockPos findBestPlacement(LivingEntity target) {
                  BlockPos origin = target.getBlockPos();
                  BlockPos best = null;
                  double bestDamage = minDamage.get();

                  int r = 4;
                  for (int dx = -r; dx <= r; dx++) {
                      for (int dz = -r; dz <= r; dz++) {
                          for (int dy = -2; dy <= 2; dy++) {
                              BlockPos p = origin.add(dx, dy, dz);
                              if (!isValidCrystalBase(p)) continue;

                              Vec3d crystalPos = new Vec3d(
                                  p.getX() + 0.5, p.getY() + 1.0, p.getZ() + 0.5);

                              double dist = mc.player.getEyePos().distanceTo(crystalPos);
                              boolean walls = !mc.player.canSee(target); // rough LOS check
                              double range = walls ? wallsRange.get() : placeRange.get();
                              if (dist > range) continue;

                              double dmgTarget = DamageUtils.crystalDamage(
                                  target, target.getPos(), target.getBoundingBox(),
                                  crystalPos, DamageUtils.HIT_FACTORY);
                              double dmgSelf = DamageUtils.crystalDamage(
                                  mc.player, mc.player.getPos(), mc.player.getBoundingBox(),
                                  crystalPos, DamageUtils.HIT_FACTORY);

                              if (dmgSelf > maxSelfDamage.get()) continue;
                              if (antiSuicide.get() &&
                                  dmgSelf >= mc.player.getHealth() + mc.player.getAbsorptionAmount()) continue;

                              if (dmgTarget > bestDamage) { bestDamage = dmgTarget; best = p; }
                          }
                      }
                  }
                  return best;
              }

              private boolean isValidCrystalBase(BlockPos p) {
                  BlockState s = mc.world.getBlockState(p);
                  // obsidian or bedrock only
                  if (!s.isOf(net.minecraft.block.Blocks.OBSIDIAN)
                   && !s.isOf(net.minecraft.block.Blocks.BEDROCK)) return false;

                  BlockPos above = p.up();
                  if (!mc.world.getBlockState(above).isAir()) return false;

                  // no entity blocking (except an existing crystal, which we'll break)
                  Box box = new Box(above);
                  for (Entity e : mc.world.getOtherEntities(null, box)) {
                      if (!(e instanceof EndCrystalEntity)) return false;
                  }
                  return true;
              }

              // ---------------------------------------------------------------
              //   ACTIONS
              // ---------------------------------------------------------------
              private void attackCrystal(EndCrystalEntity crystal) {
                  if (rotate.get()) {
                      double yaw   = Rotations.getYaw(crystal);
                      double pitch = Rotations.getPitch(crystal);
                      Rotations.rotate(yaw, pitch, 50, () -> sendAttack(crystal));
                  } else {
                      sendAttack(crystal);
                  }
              }

              private void sendAttack(EndCrystalEntity crystal) {
                  mc.player.networkHandler.sendPacket(
                      PlayerInteractEntityC2SPacket.attack(crystal, mc.player.isSneaking()));
                  mc.player.swingHand(Hand.MAIN_HAND);
              }

              private void placeCrystal(BlockPos pos) {
                  Vec3d hit = new Vec3d(pos.getX() + 0.5, pos.getY() + 1.0, pos.getZ() + 0.5);
                  BlockHitResult hr = new BlockHitResult(hit, Direction.UP, pos, false);

                  Runnable action = () -> {
                      Hand hand = InvUtils.testInOffHand(Items.END_CRYSTAL) ? Hand.OFF_HAND : Hand.MAIN_HAND;
                      mc.player.networkHandler.sendPacket(
                          new PlayerInteractBlockC2SPacket(hand, hr, 0));
                      mc.player.swingHand(hand);
                  };

                  if (rotate.get()) {
                      double yaw   = Rotations.getYaw(hit);
                      double pitch = Rotations.getPitch(hit);
                      Rotations.rotate(yaw, pitch, 50, action);
                  } else {
                      action.run();
                  }
              }

              // ---------------------------------------------------------------
              //   HOTBAR / INVENTORY MANAGEMENT
              // ---------------------------------------------------------------
              private boolean ensureCrystalHeld() {
                  if (switchMode.get() == SwitchMode.None) {
                      return InvUtils.testInHands(Items.END_CRYSTAL);
                  }

                  if (InvUtils.testInHands(Items.END_CRYSTAL)) return true;

                  FindItemResult r = InvUtils.findInHotbar(Items.END_CRYSTAL);
                  if (r.found()) {
                      switch (switchMode.get()) {
                          case Normal -> InvUtils.swap(r.slot(), false);
                          case Silent, SilentFromInventory -> InvUtils.swap(r.slot(), true);
                          default -> {}
                      }
                      return true;
                  }

                  if (switchMode.get() == SwitchMode.SilentFromInventory) {
                      // Pull one from main inventory into hotbar slot via quickSwap
                      FindItemResult inv = InvUtils.find(Items.END_CRYSTAL);
                      if (inv.found()) {
                          int hotbarSlot = mc.player.getInventory().selectedSlot;
                          mc.interactionManager.clickSlot(
                              mc.player.currentScreenHandler.syncId,
                              slotIndexToId(inv.slot()),
                              hotbarSlot,
                              SlotActionType.SWAP,
                              mc.player);
                          return true;
                      }
                  }
                  return false;
              }

              private int slotIndexToId(int idx) {
                  // Inventory index (0..35) to container slot id used by
                  // ClickSlotC2SPacket for the survival inventory screen (id 0).
                  if (idx >= 0 && idx <= 8)   return idx + 36; // hotbar
                  if (idx >= 9 && idx <= 35)  return idx;      // main inventory
                  return idx;
              }

              // ---------------------------------------------------------------
              //   RENDER
              // ---------------------------------------------------------------
              @EventHandler
              private void onRender(Render3DEvent event) {
                  if (!render.get() || lastPlace == null) return;
                  event.renderer.box(lastPlace.up(), renderSide.get(), renderLine.get(),
                                     ShapeMode.Both, 0);
              }
          }
          JAVA_MODULE

          echo "=== Project tree ==="
          find "$ROOT" -maxdepth 4 -type f | sort
          echo "===================="

      # ------------------------------------------------------------------ #
      # 3. Fix heredoc indentation (bash heredocs preserve the leading      #
      #    whitespace we used for YAML readability — strip it now).        #
      # ------------------------------------------------------------------ #
      - name: Strip leading indent from generated files
        run: |
          cd "$GITHUB_WORKSPACE/addon"
          # remove the 10 spaces of leading indent from every generated text file
          find . -type f \( -name "*.gradle" -o -name "*.properties" \
                          -o -name "*.json"   -o -name "*.java" \) \
            -exec sed -i 's/^          //' {} +

      # ------------------------------------------------------------------ #
      # 4. Set up the Gradle wrapper (no committed wrapper needed)          #
      # ------------------------------------------------------------------ #
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.8"

      - name: Init Gradle wrapper
        working-directory: addon
        run: gradle wrapper --gradle-version 8.8

      # ------------------------------------------------------------------ #
      # 5. Build                                                            #
      # ------------------------------------------------------------------ #
      - name: Build addon JAR
        working-directory: addon
        run: ./gradlew --no-daemon build

      # ------------------------------------------------------------------ #
      # 6. Publish artifacts                                                #
      # ------------------------------------------------------------------ #
      - name: Locate built JAR
        id: jar
        working-directory: addon
        run: |
          # Prefer the remapped (fabric-loom) jar, skip -dev/-sources
          JAR=$(ls -1 build/libs/*.jar \
                  | grep -viE '(-dev|-sources|-javadoc)\.jar$' \
                  | head -n 1)
          echo "path=addon/${JAR}" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$JAR")" >> "$GITHUB_OUTPUT"
          ls -lah build/libs/

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: 6b6t-addon
          path: ${{ steps.jar.outputs.path }}
          if-no-files-found: error

      - name: Publish GitHub Release (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.jar.outputs.path }}
          generate_release_notes: true
